version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifrs16-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ifrs16}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ifrs16_secret}
      POSTGRES_DB: ${DB_NAME:-ifrs16}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ifrs16} -d ${DB_NAME:-ifrs16}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ifrs16-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: ifrs16-core
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ifrs16}
      DB_PASSWORD: ${DB_PASSWORD:-ifrs16_secret}
      DB_NAME: ${DB_NAME:-ifrs16}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-ifrs16_jwt_secret_key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${CORE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./core-service:/app
    working_dir: /app

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ifrs16-ai
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CORE_SERVICE_URL: http://core-service:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${AI_PORT:-8081}:8000"
    depends_on:
      - core-service
      - minio
    volumes:
      - ./ai-service:/app
    working_dir: /app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ifrs16-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${CORE_PORT:-8080}
      NEXT_PUBLIC_AI_URL: http://localhost:${AI_PORT:-8081}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - core-service
      - ai-service
    volumes:
      - ./web:/app
      - /app/node_modules
    working_dir: /app

volumes:
  postgres_data:
  minio_data:
