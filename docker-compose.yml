services:
  postgres:
    image: postgres:16-alpine
    container_name: lease-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-lease}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lease_secret}
      POSTGRES_DB: ${DB_NAME:-lease}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lease} -d ${DB_NAME:-lease}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lease-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: lease-core
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lease}
      DB_PASSWORD: ${DB_PASSWORD:-lease_secret}
      DB_NAME: ${DB_NAME:-lease}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-lease_jwt_secret_key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${CORE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: lease-ai
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      PADDLEOCR_API_URL: ${PADDLEOCR_API_URL:-https://paddleocr.aistudio-app.com/api/v2/ocr/jobs}
      PADDLEOCR_ACCESS_TOKEN: ${PADDLEOCR_ACCESS_TOKEN:-}
      PADDLEOCR_MODEL: ${PADDLEOCR_MODEL:-PaddleOCR-VL-1.5}
      PADDLEOCR_ENABLED: ${PADDLEOCR_ENABLED:-false}
      CORE_SERVICE_URL: http://core-service:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${AI_PORT:-8081}:8000"
    depends_on:
      - core-service
      - minio

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lease-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${CORE_PORT:-8080}
      NEXT_PUBLIC_AI_URL: http://localhost:${AI_PORT:-8081}
      SERVER_API_URL: http://core-service:8080
      SERVER_AI_URL: http://ai-service:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - core-service
      - ai-service

volumes:
  postgres_data:
  minio_data:
